# =====================================================================
# energy-web — despliegue (co-hosteado con n8n en el droplet, misma VPC).
# Servicios: postgres (db) + migrate (one-shot) + web (Next standalone) + caddy.
# Límites de memoria + swap por la carga del droplet (~55-60% CPU).
# =====================================================================
services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-energy_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?define POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-energy_app}
    volumes:
      - energy_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-energy_app} -d ${POSTGRES_DB:-energy_app}"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    memswap_limit: 1g

  # One-shot: aplica migraciones (db/migrations) y sale. La web espera a que termine.
  migrate:
    build:
      context: .
      target: builder
    env_file: .env
    command: sh -c "pnpm drizzle-kit migrate"
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    mem_limit: 512m

  web:
    build:
      context: .
      target: runner
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: "3000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    mem_limit: 512m
    memswap_limit: 1g
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    mem_limit: 128m

volumes:
  energy_pgdata:
  caddy_data:
  caddy_config:
